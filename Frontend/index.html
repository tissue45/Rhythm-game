<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StepUp - Rhythm Action School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
  rel="stylesheet">
<script>
  // 디버그 로그 - index.html 로드 확인
  console.log('=== index.html 로드됨 ===');
  console.log('현재 URL:', window.location.href);
  console.log('현재 경로:', window.location.pathname);
  console.log('문서 제목:', document.title);
  console.log('BASE_URL:', import.meta?.env?.BASE_URL || 'N/A');
  
  // 화면에 로드 정보 표시
  window.addEventListener('DOMContentLoaded', function() {
    console.log('DOM 로드 완료');

    if (root) {
      root.innerHTML = '<div style="text-align:center;padding:20px;"><h2>🔍 디버그 모드</h2><p>index.html이 로드되었습니다.</p><p>콘솔을 확인하세요 (F12)</p><p>React 앱 로딩 중...</p></div>';
    }
  });
</script>
</head>

<body>
  <div id="root"
    style="background-color: black; color: white; display: flex; justify-content: center; align-items: center; height: 100vh;">
    Loading App...
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
